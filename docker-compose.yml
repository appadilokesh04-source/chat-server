version: "3.9"

services:

  db:
    image: mysql:8.0
    container_name: chat_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chatdb
    ports:
      - "3308:3306"   # 3307 on host so it doesn't clash with your local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # auto runs on first start

  redis:
    image: redis:7-alpine
    container_name: chat_redis
    restart: always
    ports:
      - "6381:6379"   # 6380 on host so it doesn't clash with local Redis

  app:
    build: .
    container_name: chat_app
    restart: always
    ports:
      - "8001:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: chatdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: lokesh
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      - db
      - redis

volumes:
  mysql_data: